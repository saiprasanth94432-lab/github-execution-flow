name: MatrixDemo
on: push
jobs:
    build:
       continue-on-error: true
       strategy:
        matrix:
            node-version: [12, 14, 16, 18]
            operating-sytems: [ubuntu-latest, windows-latest]
       runs-on: ${{matrix.operating-sytems}}
       steps:
        - name: Get Code
          uses: actions/checkout@v4
        - name: Install NodeJS
          uses: actions/setup-node@v4
          with:
            node-version: ${{matrix.node-version}}
        - name: Install Dependencies
          run: npm ci
        - name: Build project
          run: npm run build