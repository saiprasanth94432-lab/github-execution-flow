name: Reusable deploy
on:
 workflow_call:
    inputs:
        artifact-name:
          description: The name  of the depolyabe artifact files
          required: false
          default: dist
          type: string
jobs:
    deploy:
     runs-on: ubuntu-latest
     steps:
        - name: Get Code
          uses: actions/download-artifacts@v4
          with:
            name: ${{inputs.artifact-name}}
        - name: List Files
          run: ls
        - name: Output Information
          run: echo "Deploying & uploading"
